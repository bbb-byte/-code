services:
  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ecommerce_analysis}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - ecommerce-network

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST:-mysql}:${MYSQL_PORT:-3306}/${MYSQL_DATABASE:-ecommerce_analysis}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-root123456}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_TIMEOUT: 500ms
      PUBLIC_TASK_PYTHON: ${PUBLIC_TASK_PYTHON:-python3}
      PUBLIC_TASK_BROWSER_PATH: ${PUBLIC_TASK_BROWSER_PATH:-}
      PUBLIC_TASK_BROWSER_CHANNEL: ${PUBLIC_TASK_BROWSER_CHANNEL:-chrome}
      PUBLIC_TASK_BROWSER_PROFILE_DIR: ${PUBLIC_TASK_BROWSER_PROFILE_DIR:-/workspace/runtime/browser-profile}
      PUBLIC_TASK_WORKER_URL: ${PUBLIC_TASK_WORKER_URL:-http://public-task-worker:8090}
      PUBLIC_TASK_WORKSPACE_ROOT: ${PUBLIC_TASK_WORKSPACE_ROOT:-/workspace}
      PUBLIC_TASK_CDP_URL: ${PUBLIC_TASK_CDP_URL:-http://host.docker.internal:9223}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      public-task-worker:
        condition: service_started
    volumes:
      - ./:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ecommerce-network

  public-task-worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: ecommerce-public-task-worker
    restart: always
    working_dir: /workspace
    environment:
      PUBLIC_TASK_PYTHON: ${PUBLIC_TASK_PYTHON:-python3}
      PUBLIC_TASK_BROWSER_PATH: ${PUBLIC_TASK_BROWSER_PATH:-/usr/bin/chromium}
      PUBLIC_TASK_BROWSER_CHANNEL: ${PUBLIC_TASK_BROWSER_CHANNEL:-chrome}
      PUBLIC_TASK_BROWSER_PROFILE_DIR: ${PUBLIC_TASK_BROWSER_PROFILE_DIR:-/workspace/runtime/browser-profile}
      PUBLIC_TASK_WORKSPACE_ROOT: ${PUBLIC_TASK_WORKSPACE_ROOT:-/workspace}
      PUBLIC_TASK_CDP_URL: ${PUBLIC_TASK_CDP_URL:-http://host.docker.internal:9223}
    ports:
      - "8090:8090"
    volumes:
      - ./crawler:/workspace/crawler
      - ./frontend/scripts:/workspace/frontend/scripts
      - ./runtime/browser-profile:/workspace/runtime/browser-profile
      - ./runtime/uploads:/workspace/runtime/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ecommerce-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ecommerce-network

volumes:
  mysql_data:
  redis_data:

networks:
  ecommerce-network:
    driver: bridge
